<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить подписку</title>
    <style>
        /* Основные стили страницы */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Черный фон */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Контейнер для снежинок */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            user-select: none;
            z-index: 1;
            filter: blur(1px);
        }

        /* Кнопка */
        .btn-container {
            z-index: 10;
        }

        .subscribe-button {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #2c3e50, #000);
            border: 2px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subscribe-button:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        /* Анимация падения */
        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }
    </style>
</head>
<body>

    <div id="snow-container"></div>

    <div class="btn-container">
        <a href="happ://add/https://clck.ru/3SPWky" class="subscribe-button">
            Добавить подписку
        </a>
    </div>

    <script>
        const container = document.getElementById('snow-container');
        const snowflakeCount = 100; // Количество снежинок

        function createSnowflake() {
            const snowflake = document.createElement('div');
            const size = Math.random() * 5 + 2 + 'px';
            
            snowflake.classList.add('snowflake');
            snowflake.innerText = '•'; // Можно заменить на '❄', если нужны крупные снежинки
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.fontSize = size;
            snowflake.style.opacity = Math.random();
            
            // Продолжительность анимации от 5 до 15 секунд
            const duration = Math.random() * 10 + 5 + 's';
            snowflake.style.animation = `fall ${duration} linear infinite`;
            
            // Задержка начала
            snowflake.style.animationDelay = Math.random() * -20 + 's';

            container.appendChild(snowflake);
        }

        // Создаем снежинки при загрузке
        for (let i = 0; i < snowflakeCount; i++) {
            createSnowflake();
        }
    </script>
</body>
</html>
