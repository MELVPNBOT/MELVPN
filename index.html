<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelVPN | Подписка</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Верхняя панель */
        .top-bar { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .left-menu { display: flex; gap: 15px; align-items: center; }
        .icon { width: 30px; height: 30px; cursor: pointer; filter: invert(1); }
        .time { font-family: monospace; font-size: 1.2rem; }

        /* Центр */
        .content { text-align: center; z-index: 10; }
        .subscribe-button { padding: 15px 30px; background: #fff; color: #000; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-block; }
        .sub-text { margin-top: 15px; color: #888; font-size: 0.9rem; }
        
        /* Футер */
        .footer { position: absolute; bottom: 20px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="left-menu">
            <a href="https://t.me/melvpntop"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="icon"></a>
            <img src="https://cdn-icons-png.flaticon.com/512/126/126472.png" class="icon" onclick="toggleLang()" style="cursor:pointer">
        </div>
        <div class="time" id="msk-time">--:--</div>
    </div>

    <div class="content">
        <a href="javascript:void(0)" onclick="openHapp()" class="subscribe-button">Добавить подписку</a>
        <p class="sub-text">Строго добавление в Happ</p>
    </div>

    <div class="footer">Спасибо! что пользуетесь нашим впн!</div>

    <script>
        // Время по МСК
        function updateTime() {
            const now = new Date().toLocaleString("ru-RU", {timeZone: "Europe/Moscow", hour: '2-digit', minute: '2-digit'});
            document.getElementById('msk-time').innerText = now;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Логика перехода
        function openHapp() {
            window.location.href = "happ://add/https://clck.ru/3SPWky";
        }

        // Заглушка для языка
        function toggleLang() {
            alert("Функция смены языка в разработке");
        }
    </script>
</body>
</html>
