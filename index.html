<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MELVPN Setup</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #2c3e50; color: white; border-radius: 8px; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #34495e; text-align: center; }
        .step { margin-bottom: 20px; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219150; }
        .highlight { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div><strong>MELVPN</strong></div>
</header>

<div class="container">
    <div class="step">
        <p><strong>1. Выберите приложение:</strong></p>
        <select id="appSelect" onchange="updateButton()">
            <option value="happ">Happ (Рекомендуется ⭐)</option>
            <option value="v2raytun">V2RayTun</option>
        </select>
    </div>

    <div class="step">
        <p><strong>2. Добавьте подписку:</strong></p>
        <button id="addBtn" onclick="addSubscription()">Добавить подписку</button>
    </div>

    <div class="step">
        <p><strong>3. Пользуйтесь!</strong></p>
        <p>После добавления включите тумблер в приложении.</p>
    </div>
</div>

<script>
    function updateButton() {
        const app = document.getElementById('appSelect').value;
        const btn = document.getElementById('addBtn');
        btn.innerText = app === 'happ' ? "Добавить в Happ" : "Добавить в V2RayTun";
    }

    function addSubscription() {
        const app = document.getElementById('appSelect').value;
        const subUrl = "https://clck.ru/3SPWky";
        
        if (app === 'happ') {
            window.location.href = "happ://add/" + subUrl;
        } else {
            // Для V2RayTun обычно используется импорт из буфера обмена 
            // или схема v2raytun:// (если поддерживается)
            alert("Скопируйте ссылку подписки: " + subUrl + "\nВ V2RayTun нажмите '+' -> 'Импорт из буфера'");
            navigator.clipboard.writeText(subUrl);
        }
    }
</script>

</body>
</html>
