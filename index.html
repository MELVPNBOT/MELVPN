<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MELVPN Dashboard</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .details { display: none; font-size: 0.9em; color: #94a3b8; margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155; }
        button { cursor: pointer; background: var(--primary); border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; }
        .ping { color: #facc15; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MELVPN</h1>
        <nav>
            <button onclick="show('home')">Главная</button>
            <button onclick="show('servers')">Сервера</button>
            <button onclick="show('sub')">Подписка</button>
        </nav>

        <div id="home" class="tab-content active">
            <h2>О MELVPN</h2>
            <p>Бесплатный VPN на базе открытых исходников.</p>
        </div>

        <div id="servers" class="tab-content">
            <div id="server-list">Загрузка...</div>
        </div>

        <div id="sub" class="tab-content">
            <h2>Полная подписка</h2>
            <p>Скопируйте эту ссылку в ваш клиент для импорта всех серверов сразу:</p>
            <input type="text" id="sub-link" readonly style="width:100%; padding:10px; background:#1e293b; color:white; border:none;">
            <button onclick="copySub()">Копировать подписку</button>
        </div>
    </div>

    <script>
        const SUB_URL = 'https://raw.githubusercontent.com/MELVPNBOT/MELVPN/refs/heads/main/configs.txt';

        function show(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function fetchServers() {
            const res = await fetch(SUB_URL);
            const text = await res.text();
            const list = document.getElementById('server-list');
            
            // Генерация ссылки подписки (Base64)
            document.getElementById('sub-link').value = btoa(text);

            text.split('\n').filter(line => line.startsWith('vless')).forEach((line, i) => {
                const url = new URL(line);
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3 onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block' ? 'none' : 'block')">
                        ${url.hash.substring(1)} <span class="ping" id="p-${i}">...ping</span>
                    </h3>
                    <div class="details">
                        <p>IP: ${url.hostname}</p>
                        <p>Port: ${url.port}</p>
                        <p>SNI: ${url.searchParams.get('sni')}</p>
                        <a href="happ://add/${encodeURIComponent(line)}">Добавить сервер</a>
                    </div>
                `;
                list.appendChild(card);
                ping(url.hostname, i);
            });
        }

        async function ping(host, id) {
            const start = Date.now();
            try {
                await fetch(`https://${host}`, { mode: 'no-cors' });
                document.getElementById(`p-${id}`).innerText = (Date.now() - start) + 'ms';
            } catch { document.getElementById(`p-${id}`).innerText = 'Offline'; }
        }

        function copySub() {
            const copyText = document.getElementById("sub-link");
            copyText.select();
            document.execCommand("copy");
            alert("Ссылка скопирована!");
        }

        fetchServers();
    </script>
</body>
</html>
