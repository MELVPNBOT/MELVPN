<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>MELVPN Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

<nav class="flex justify-center gap-6 p-6 glass sticky top-0 z-50">
    <button onclick="switchTab('home')" class="font-bold hover:text-emerald-400">Главная</button>
    <button onclick="switchTab('servers')" class="font-bold hover:text-emerald-400">Сервера</button>
    <button onclick="switchTab('sub')" class="font-bold hover:text-emerald-400">Подписка</button>
</nav>

<main class="container mx-auto px-4 max-w-4xl py-10">
    <section id="home" class="tab-content active glass p-8 rounded-2xl">
        <h1 class="text-4xl font-black text-emerald-400 mb-4">MELVPN</h1>
        <p class="text-slate-300">Бесплатный сервис для свободного интернета. Мы берем конфиги из открытых источников, чтобы вы не платили за то, что должно быть доступно каждому.</p>
    </section>

    <section id="servers" class="tab-content">
        <div id="server-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-center p-10">Загрузка серверов...</p>
        </div>
    </section>

    <section id="sub" class="tab-content glass p-8 rounded-2xl">
        <h2 class="text-2xl font-bold mb-4">Ссылка на подписку</h2>
        <textarea id="sub-data" class="w-full bg-slate-900 p-4 rounded-lg mb-4 text-xs font-mono" rows="4" readonly></textarea>
        <button onclick="copySub()" class="bg-emerald-600 w-full py-3 rounded-lg font-bold">Скопировать подписку</button>
    </section>
</main>

<script>
// Переключение вкладок
function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Загрузка данных
async function load() {
    const list = document.getElementById('server-list');
    try {
        const response = await fetch('https://raw.githubusercontent.com/MELVPNBOT/MELVPN/refs/heads/main/configs.txt?t=' + Date.now());
        const text = await response.text();
        
        // Подписка (Base64)
        document.getElementById('sub-data').value = btoa(text);
        
        list.innerHTML = '';
        const lines = text.split('\n').filter(l => l.trim().startsWith('vless://'));
        
        lines.forEach((line, i) => {
            const url = new URL(line);
            const name = url.hash.substring(1) || "Сервер " + (i+1);
            
            list.innerHTML += `
            <div class="glass p-5 rounded-xl border border-slate-700">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-emerald-400 font-bold">${name}</span>
                    <span id="p-${i}" class="text-[10px] bg-slate-800 px-2 rounded">Ping...</span>
                </div>
                <div class="text-[11px] text-slate-400 mb-4">IP: ${url.hostname} | SNI: ${url.searchParams.get('sni')}</div>
                <a href="happ://add/${encodeURIComponent(line)}" class="block bg-slate-700 hover:bg-slate-600 text-center py-2 rounded-md font-bold text-sm">Добавить</a>
            </div>`;
            
            // Пинг-тест
            fetch(`https://${url.hostname}`, {mode:'no-cors'}).then(() => {
                document.getElementById(`p-${i}`).innerText = 'Online';
            }).catch(() => document.getElementById(`p-${i}`).innerText = 'Offline');
        });
    } catch(e) {
        list.innerHTML = '<p class="text-red-500">Ошибка: проверьте файл configs.txt</p>';
    }
}

function copySub() {
    const el = document.getElementById("sub-data");
    el.select();
    document.execCommand("copy");
    alert("Скопировано!");
}

load();
</script>
</body>
</html>
