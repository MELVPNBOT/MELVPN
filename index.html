<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт отключен</title>
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Шапка */
        header { 
            display: flex; align-items: center; padding: 15px 5%; 
            background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; border-bottom: 1px solid #333; z-index: 100;
        }
        header img { width: 45px; height: 45px; border-radius: 8px; margin-right: 15px; border: 1px solid var(--accent); }
        header h1 { font-size: 22px; letter-spacing: 1px; color: var(--accent); margin: 0; text-transform: uppercase; }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; flex-grow: 1; }
        .hidden { display: none !important; }

        /* Стиль Капчи */
        .captcha-wrapper { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #222; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 80%; margin: 10px 0; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        button { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; width: 100%; max-width: 300px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); }

        /* Текст на главной */
        .promo-section h2 { color: var(--accent); font-size: 32px; }
        .benefit { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--accent); text-align: left; }
        .benefit h3 { margin-top: 0; color: #fff; }

        /* Страница подписки */
        .device-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 30px 0; }
        .device-btn { background: #222; padding: 25px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .device-btn:hover { border-color: var(--accent); }
        .selected { border-color: var(--accent); background: #1a2a22; }
    </style>
</head>
<body>

    <header>
        <img src="https://cdn.jsdelivr.net/gh/MELVPNBOT/MELVPN@main/pic.png" alt="MELVPN Logo">
        <h1>MELVPN сайт отключен</h1>
    </header>

    
        <div id="main-site" class="hidden">
            <div class="promo-section">
                <h2>Почему MELVPN?</h2>
                <div class="benefit">
                    <h3></h3>
                    <p>.</p>
                </div>
                <div class="benefit">
                    <h3></h3>
                    <p>
                <div class="benefit">
                    <h3>сайт отключен</h3>
                    <p>
                <p style="color: #888;">Сайт отключен</p>
            </div>
        </div>

</body>
</html>
