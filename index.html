<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelVPN | Подписка</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; text-align: center;
        }
        .container { padding: 20px; width: 90%; max-width: 400px; }
        .hidden { display: none; }
        input { 
            padding: 12px; border-radius: 8px; border: 1px solid #444; 
            background: #222; color: #fff; width: 60px; text-align: center; font-size: 1.2rem;
        }
        button { 
            padding: 12px 25px; border-radius: 8px; border: none; 
            background: #444; color: #fff; cursor: pointer; font-weight: bold; margin-left: 10px;
        }
        .subscribe-button { 
            background: #fff; color: #000; text-decoration: none; 
            padding: 15px 30px; border-radius: 25px; display: inline-block; 
            font-weight: bold; margin-top: 20px;
        }
        .footer { margin-top: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container" id="captcha-box">
        <h3>Подтвердите, что вы не робот</h3>
        <p id="question" style="font-size: 1.5rem; margin: 20px 0;"></p>
        <input type="number" id="answer" placeholder="?">
        <button onclick="checkCaptcha()">Проверить</button>
    </div>

    <div id="link-box" class="hidden">
        <h3>Доступ разрешен</h3>
        <a href="happ://add/https://clck.ru/3SPWky" class="subscribe-button">Добавить подписку</a>
        <p style="margin-top: 20px; color: #888; font-size: 0.9rem;">Строго для приложения Happ</p>
    </div>

    <div class="footer">Спасибо, что пользуетесь MelVPN!</div>

    <script>
        // Генерация примера
        const a = Math.floor(Math.random() * 10) + 1;
        const b = Math.floor(Math.random() * 10) + 1;
        document.getElementById('question').innerText = `${a} + ${b} = ?`;

        function checkCaptcha() {
            const userAns = document.getElementById('answer').value;
            if (parseInt(userAns) === (a + b)) {
                document.getElementById('captcha-box').classList.add('hidden');
                document.getElementById('link-box').classList.remove('hidden');
            } else {
                alert("Неверно, попробуйте еще раз.");
            }
        }
    </script>
</body>
</html>
